name: Terraform CI Pipeline

on:
  push:
    branches:
      - ai_infra

jobs:
  terraform-ci:
    name: Validate, Cost & Security Check
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Connect to AWS ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      # ── 3. Set up Terraform ───────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init -no-color
        working-directory: generated

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: generated

      - name: Terraform Plan
        run: terraform plan -no-color
        working-directory: generated

      # ── 4. Infracost - cost estimation ────────────────────────────
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost
        id: infracost
        run: |
          infracost breakdown \
            --path generated \
            --format table \
            --out-file infracost-report.txt
          cat infracost-report.txt
        continue-on-error: true  # warn only, don't block

      - name: Upload Infracost report
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report
          path: infracost-report.txt

      # ── 5. Trivy - security scan ──────────────────────────────────
      - name: Run Trivy security scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: generated
          format: table
          exit-code: 0        # warn only, don't block
          severity: CRITICAL,HIGH,MEDIUM

      # ── 6. Create Pull Request to main ───────────────────────────
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token:  ${{ secrets.GITHUB_TOKEN }}
          base:   main
          branch: ai_infra
          title:  "[AI Infra] Terraform changes from ai_infra"
          body: |
            ## 🤖 Automated Terraform PR

            This PR was created automatically by the Terraform AI Agent.

            ### ✅ Pipeline Results
            - **AWS Connection**: Connected (eu-central-1)
            - **Terraform**: Init → Validate → Plan passed
            - **Infracost**: See artifact `infracost-report` for cost breakdown
            - **Trivy**: Security scan completed (check logs for findings)

            > ⚠️ Please review Infracost and Trivy results before merging.
          labels: |
            terraform
            ai-generated
            infra
